tags:
  - name: Auth
    description: Authentication, sessions, password reset, and email verification
  - name: Users
    description: User administration
  - name: Doctors
    description: Doctor profiles and availability
  - name: Patients
    description: Patient registry
  - name: Appointments
    description: Appointment scheduling and status
  - name: Departments
    description: Hospital departments
  - name: Medical Records
    description: Patient medical records
  - name: Billing
    description: Invoices and billing records
  - name: Payments
    description: Payment collection and reconciliation
  - name: Medicines
    description: Pharmacy medicine catalog
  - name: Prescriptions
    description: Prescriptions and prescription items
  - name: Uploads
    description: Documents and image uploads
  - name: Notifications
    description: User notifications
  - name: Activity Logs
    description: Audit trail

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Search:
      in: query
      name: search
      schema:
        type: string
      example: maya
    SortBy:
      in: query
      name: sortBy
      schema:
        type: string
        default: id
      example: created_at
    SortOrder:
      in: query
      name: sortOrder
      schema:
        type: string
        enum: [asc, desc, ASC, DESC]
        default: desc

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Authentication required
            errors: []
    Forbidden:
      description: Authenticated user does not have required role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: You do not have permission to perform this action
            errors: []
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Resource not found
            errors: []
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Validation failed
            errors:
              - field: email
                message: Valid email is required
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Internal server error
            errors: []

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully
        data:
          nullable: true
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 184
        totalPages:
          type: integer
          example: 10
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@hms.com
        password:
          type: string
          format: password
          example: Admin@12345
        rememberLogin:
          type: boolean
          example: true
    RegisterRequest:
      type: object
      required: [fullName, email, password]
      properties:
        fullName:
          type: string
          example: Riya Sharma
        email:
          type: string
          format: email
          example: riya@hms.com
        phone:
          type: string
          example: "+911000000003"
        password:
          type: string
          format: password
          example: Strong@123
        role:
          type: string
          enum: [Admin, Doctor, Receptionist, Patient]
          example: Receptionist
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: admin@hms.com
    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          example: 7d1f9e8b2f0a4f0d9c2a0d3d5b2e7f0a
        newPassword:
          type: string
          format: password
          example: NewStrong@123
        confirmPassword:
          type: string
          format: password
          example: NewStrong@123
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
          example: OldStrong@123
        newPassword:
          type: string
          format: password
          example: NewStrong@123
    TokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
        allDevices:
          type: boolean
          example: false
    User:
      type: object
      properties:
        id:
          type: integer
        role_id:
          type: integer
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
    UserInput:
      type: object
      required: [role_id, full_name, email, password]
      properties:
        role_id:
          type: integer
          example: 2
        full_name:
          type: string
          example: Dr. Arjun Mehta
        email:
          type: string
          format: email
          example: doctor@hms.com
        phone:
          type: string
          example: "+911000000002"
        password:
          type: string
          format: password
          example: Doctor@123
        status:
          type: string
          enum: [active, inactive, suspended]
    DepartmentInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Cardiology
        description:
          type: string
          example: Heart and cardiovascular care
        status:
          type: string
          enum: [active, inactive]
          example: active
    DoctorInput:
      type: object
      required: [user_id, department_id, license_number, specialization]
      properties:
        user_id:
          type: integer
          example: 2
        department_id:
          type: integer
          example: 1
        license_number:
          type: string
          example: MED-DEL-10001
        specialization:
          type: string
          example: Internal Medicine
        qualification:
          type: string
          example: MBBS, MD
        consultation_fee:
          type: number
          example: 800
        availability_status:
          type: string
          enum: [available, unavailable, on_leave]
          example: available
    PatientInput:
      type: object
      required: [patient_code, full_name, gender, date_of_birth, phone]
      properties:
        patient_code:
          type: string
          example: PAT-2026-0001
        full_name:
          type: string
          example: Aman Verma
        gender:
          type: string
          enum: [male, female, other]
        date_of_birth:
          type: string
          format: date
          example: "1998-04-15"
        blood_group:
          type: string
          example: B+
        phone:
          type: string
          example: "+911000000004"
        email:
          type: string
          format: email
          example: patient@hms.com
        address:
          type: string
    AppointmentInput:
      type: object
      required: [patient_id, doctor_id, department_id, appointment_date, start_time, end_time]
      properties:
        patient_id:
          type: integer
          example: 1
        doctor_id:
          type: integer
          example: 1
        department_id:
          type: integer
          example: 1
        appointment_date:
          type: string
          format: date
          example: "2026-07-01"
        start_time:
          type: string
          example: "10:00:00"
        end_time:
          type: string
          example: "10:30:00"
        status:
          type: string
          enum: [scheduled, checked_in, in_consultation, completed, cancelled, no_show]
        reason:
          type: string
          example: Fever and headache
        notes:
          type: string
    AppointmentStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [scheduled, checked_in, in_consultation, completed, cancelled, no_show]
          example: checked_in
    MedicalRecordInput:
      type: object
      required: [patient_id, diagnosis]
      properties:
        patient_id:
          type: integer
          example: 1
        doctor_id:
          type: integer
          example: 1
        appointment_id:
          type: integer
          example: 1
        diagnosis:
          type: string
          example: Viral fever suspected
        symptoms:
          type: string
        treatment_plan:
          type: string
        notes:
          type: string
    BillingInput:
      type: object
      required: [patient_id, invoice_number, total_amount]
      properties:
        patient_id:
          type: integer
          example: 1
        appointment_id:
          type: integer
          example: 1
        invoice_number:
          type: string
          example: INV-2026-0001
        subtotal:
          type: number
          example: 800
        tax_amount:
          type: number
          example: 0
        discount_amount:
          type: number
          example: 0
        total_amount:
          type: number
          example: 800
        paid_amount:
          type: number
          example: 0
        balance_amount:
          type: number
          example: 800
        status:
          type: string
          enum: [draft, issued, partially_paid, paid, cancelled, refunded]
    PaymentInput:
      type: object
      required: [billing_id, amount, payment_method]
      properties:
        billing_id:
          type: integer
          example: 1
        amount:
          type: number
          example: 800
        payment_method:
          type: string
          enum: [cash, card, upi, bank_transfer, insurance]
          example: upi
        transaction_reference:
          type: string
          example: UPI-HMS-2026-0001
        status:
          type: string
          enum: [pending, successful, failed, refunded]
    MedicineInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Paracetamol 500mg
        generic_name:
          type: string
          example: Paracetamol
        category:
          type: string
          example: Analgesic
        manufacturer:
          type: string
        unit_price:
          type: number
          example: 2.5
        stock_quantity:
          type: integer
          example: 1000
        reorder_level:
          type: integer
          example: 100
        expiry_date:
          type: string
          format: date
    PrescriptionInput:
      type: object
      required: [patient_id, doctor_id]
      properties:
        patient_id:
          type: integer
        doctor_id:
          type: integer
        appointment_id:
          type: integer
        medical_record_id:
          type: integer
        instructions:
          type: string
    PrescriptionItemInput:
      type: object
      required: [prescription_id, medicine_id, dosage, frequency, duration]
      properties:
        prescription_id:
          type: integer
        medicine_id:
          type: integer
        dosage:
          type: string
          example: 500mg
        frequency:
          type: string
          example: Twice daily
        duration:
          type: string
          example: 3 days
        quantity:
          type: integer
          example: 6
        instructions:
          type: string
    NotificationInput:
      type: object
      required: [user_id, title, message]
      properties:
        user_id:
          type: integer
          example: 4
        title:
          type: string
          example: Appointment Confirmed
        message:
          type: string
          example: Your appointment has been confirmed.
        type:
          type: string
          enum: [info, success, warning, error, appointment, billing, system]
        is_read:
          type: boolean
    UploadMetadataUpdate:
      type: object
      properties:
        patient_id:
          type: integer
        medical_record_id:
          type: integer
        visibility:
          type: string
          enum: [private, staff_only, patient_visible]
    ActivityLogInput:
      type: object
      properties:
        user_id:
          type: integer
        action:
          type: string
          example: create_patient
        entity_type:
          type: string
          example: patients
        entity_id:
          type: integer
        description:
          type: string

paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201": { description: Registration successful }
        "422": { $ref: "#/components/responses/ValidationError" }
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and receive JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              example:
                success: true
                message: Login successful
                data:
                  accessToken: eyJhbGciOi...
                  refreshToken: eyJhbGciOi...
                  tokenType: Bearer
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /auth/refresh-token:
    post:
      tags: [Auth]
      security: []
      summary: Rotate refresh token and issue a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200": { description: Token refreshed successfully }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/forgot-password:
    post:
      tags: [Password Reset]
      security: []
      summary: Generate a password reset token and send dummy email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Password reset email generated if account exists
          content:
            application/json:
              example:
                success: true
                message: If the email exists, a password reset link has been sent
                data:
                  expiresInMinutes: 30
                  resetToken: dev-only-token
                  resetUrl: http://localhost:5173/reset-password?token=dev-only-token
        "422": { $ref: "#/components/responses/ValidationError" }
  /auth/reset-password:
    post:
      tags: [Password Reset]
      security: []
      summary: Reset password using a valid reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200": { description: Password reset successfully }
        "400":
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422": { $ref: "#/components/responses/ValidationError" }
  /auth/verify-email:
    post:
      tags: [Auth]
      security: []
      summary: Verify email using a dummy verification token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200": { description: Email verified successfully }
  /auth/resend-verification:
    post:
      tags: [Auth]
      security: []
      summary: Resend dummy email verification token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200": { description: Verification token generated if applicable }
  /auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated profile
      responses:
        "200": { description: Profile fetched successfully }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/change-password:
    patch:
      tags: [Auth]
      summary: Change password for authenticated user
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200": { description: Password changed successfully }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session or all devices
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200": { description: Logout successful }

  /uploads:
    get:
      tags: [Uploads]
      summary: List uploaded files
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200": { description: Upload list fetched successfully }
    post:
      tags: [Uploads]
      summary: Upload a medical report, prescription, bill, or patient document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                upload_type:
                  type: string
                  enum: [medical_report, prescription, bill, patient_document]
                patient_id:
                  type: integer
                medical_record_id:
                  type: integer
                visibility:
                  type: string
                  enum: [private, staff_only, patient_visible]
      responses:
        "201": { description: File uploaded successfully }
        "413": { description: File size exceeds configured limit }
        "415": { description: Unsupported file type }
  /uploads/images:
    post:
      tags: [Uploads]
      summary: Upload, resize, and compress an image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, image_type, entity_type, entity_id]
              properties:
                image:
                  type: string
                  format: binary
                image_type:
                  type: string
                  enum: [profile_image, doctor_image, patient_image, hospital_logo]
                entity_type:
                  type: string
                  enum: [user, doctor, patient, hospital]
                entity_id:
                  type: integer
                visibility:
                  type: string
                  enum: [private, staff_only, patient_visible]
      responses:
        "201": { description: Image uploaded successfully }
  /uploads/images/{id}:
    patch:
      tags: [Uploads]
      summary: Replace image or update image metadata
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                image_type:
                  type: string
                  enum: [profile_image, doctor_image, patient_image, hospital_logo]
                entity_type:
                  type: string
                  enum: [user, doctor, patient, hospital]
                entity_id:
                  type: integer
                visibility:
                  type: string
                  enum: [private, staff_only, patient_visible]
      responses:
        "200": { description: Image updated successfully }
  /uploads/images/{id}/preview:
    get:
      tags: [Uploads]
      summary: Preview uploaded image
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Image binary
          content:
            image/webp:
              schema:
                type: string
                format: binary
  /uploads/{id}:
    get:
      tags: [Uploads]
      summary: Get upload metadata
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Upload fetched successfully }
    patch:
      tags: [Uploads]
      summary: Update safe upload metadata
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadMetadataUpdate"
      responses:
        "200": { description: Upload metadata updated successfully }
    delete:
      tags: [Uploads]
      summary: Delete upload metadata and physical file
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: File deleted successfully }

  /users:
    get:
      tags: [Users]
      summary: List users
      parameters: &listParams
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200": { description: User list fetched successfully }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInput" }
      responses:
        "201": { description: User created successfully }
        "422": { $ref: "#/components/responses/ValidationError" }
  /users/{id}:
    get:
      tags: [Users]
      summary: Get user
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: User fetched successfully }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Users]
      summary: Update user
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInput" }
      responses:
        "200": { description: User updated successfully }
    delete:
      tags: [Users]
      summary: Delete user
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: User deleted successfully }

  /departments:
    get:
      tags: [Departments]
      summary: List departments
      parameters: *listParams
      responses:
        "200": { description: Department list fetched successfully }
    post:
      tags: [Departments]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DepartmentInput" }
      responses:
        "201": { description: Department created successfully }
  /departments/{id}:
    get:
      tags: [Departments]
      summary: Get department
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Department fetched successfully }
    patch:
      tags: [Departments]
      summary: Update department
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DepartmentInput" }
      responses:
        "200": { description: Department updated successfully }
    delete:
      tags: [Departments]
      summary: Delete department
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Department deleted successfully }

  /doctors:
    get:
      tags: [Doctors]
      summary: List doctors
      parameters: *listParams
      responses:
        "200": { description: Doctor list fetched successfully }
    post:
      tags: [Doctors]
      summary: Create doctor profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DoctorInput" }
      responses:
        "201": { description: Doctor created successfully }
  /doctors/{id}:
    get:
      tags: [Doctors]
      summary: Get doctor
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Doctor fetched successfully }
    patch:
      tags: [Doctors]
      summary: Update doctor
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DoctorInput" }
      responses:
        "200": { description: Doctor updated successfully }
    delete:
      tags: [Doctors]
      summary: Delete doctor
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Doctor deleted successfully }

  /patients:
    get:
      tags: [Patients]
      summary: List patients
      parameters: *listParams
      responses:
        "200": { description: Patient list fetched successfully }
    post:
      tags: [Patients]
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
