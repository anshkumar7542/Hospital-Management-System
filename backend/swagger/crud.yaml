components:
  parameters:
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number.
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size.
    Search:
      in: query
      name: search
      schema:
        type: string
      description: Full-text search across configured searchable fields.
    SortBy:
      in: query
      name: sortBy
      schema:
        type: string
        default: id
      description: Whitelisted column to sort by.
    SortOrder:
      in: query
      name: sortOrder
      schema:
        type: string
        enum: [asc, desc, ASC, DESC]
        default: DESC
      description: Sort direction.
    Id:
      in: path
      name: id
      required: true
      schema:
        type: integer
        minimum: 1
  schemas:
    ApiSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          nullable: true
        meta:
          type: object
          nullable: true
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: object
    DepartmentInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]
    DoctorInput:
      type: object
      required: [user_id, department_id, license_number, specialization]
      properties:
        user_id:
          type: integer
        department_id:
          type: integer
        license_number:
          type: string
        specialization:
          type: string
        qualification:
          type: string
        consultation_fee:
          type: number
        availability_status:
          type: string
          enum: [available, unavailable, on_leave]
    PatientInput:
      type: object
      required: [patient_code, full_name, gender, date_of_birth, phone]
      properties:
        patient_code:
          type: string
        full_name:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        date_of_birth:
          type: string
          format: date
        blood_group:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          type: string
    AppointmentInput:
      type: object
      required: [patient_id, doctor_id, department_id, appointment_date, start_time, end_time]
      properties:
        patient_id:
          type: integer
        doctor_id:
          type: integer
        department_id:
          type: integer
        appointment_date:
          type: string
          format: date
        start_time:
          type: string
          example: "10:00:00"
        end_time:
          type: string
          example: "10:30:00"
        status:
          type: string
          enum: [scheduled, checked_in, in_consultation, completed, cancelled, no_show]
        reason:
          type: string
        notes:
          type: string
    MedicalRecordInput:
      type: object
      required: [patient_id, diagnosis]
      properties:
        patient_id:
          type: integer
        doctor_id:
          type: integer
        appointment_id:
          type: integer
        diagnosis:
          type: string
        symptoms:
          type: string
        treatment_plan:
          type: string
        notes:
          type: string
    BillingInput:
      type: object
      required: [patient_id, invoice_number, total_amount]
      properties:
        patient_id:
          type: integer
        appointment_id:
          type: integer
        invoice_number:
          type: string
        subtotal:
          type: number
        tax_amount:
          type: number
        discount_amount:
          type: number
        total_amount:
          type: number
        paid_amount:
          type: number
        balance_amount:
          type: number
        status:
          type: string
          enum: [draft, issued, partially_paid, paid, cancelled, refunded]
    PaymentInput:
      type: object
      required: [billing_id, amount, payment_method]
      properties:
        billing_id:
          type: integer
        amount:
          type: number
        payment_method:
          type: string
          enum: [cash, card, upi, bank_transfer, insurance]
        transaction_reference:
          type: string
        status:
          type: string
          enum: [pending, successful, failed, refunded]
    MedicineInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        generic_name:
          type: string
        category:
          type: string
        manufacturer:
          type: string
        batch_number:
          type: string
        unit_price:
          type: number
        stock_quantity:
          type: integer
        reorder_level:
          type: integer
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, discontinued]
    NotificationInput:
      type: object
      required: [user_id, title, message]
      properties:
        user_id:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [info, success, warning, error, appointment, billing, system]
        is_read:
          type: boolean

paths:
  /doctors:
    get:
      tags: [Doctors]
      summary: List doctors with pagination, filtering, sorting, and search
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200": { description: Doctors fetched successfully }
    post:
      tags: [Doctors]
      summary: Create doctor profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DoctorInput" }
      responses:
        "201": { description: Doctor created successfully }
  /doctors/{id}:
    get:
      tags: [Doctors]
      summary: Get doctor by id
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { description: Doctor fetched successfully }
    patch:
      tags: [Doctors]
      summary: Update doctor
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DoctorInput" }
      responses:
        "200": { description: Doctor updated successfully }
    delete:
      tags: [Doctors]
      summary: Delete doctor
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { description: Doctor deleted successfully }

